<!-- Build a simple habit tracker UI:
- A form to add a new habit (input + button)
- A list of habits below
- Each habit shows its name and a "Mark done" button
-->

<div class="habit-container">
  <h2>My Goals</h2>

  <form (ngSubmit)="onSubmit(newHabit)" #form="ngForm">
    <input
      #newHabit
      type="text"
      placeholder="Enter a new goal..."
      required
    />
    <button type="submit">Add</button>
  </form>

  <p>Total Goals: {{ habits().length }}</p>

  <ul>
    <li *ngFor="let habit of habits(); let i = index" [class.done]="habit.done">
      <span>{{ habit.name }}</span>
      <button (click)="markDone(i)">Mark done</button>
      <button (click)="deleteHabit(i)">Delete</button>
    </li>
  </ul>
</div>
